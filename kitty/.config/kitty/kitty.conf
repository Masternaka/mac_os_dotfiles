# ╔══════════════════════════════════════════════════════════╗
# ║                 Configuration de kitty                   ║
# ╚══════════════════════════════════════════════════════════╝

# ── Thèmes ─────────────────────────────────────────────────
include ~/.config/kitty/themes/catppuccin-macchiato.conf

# ── Fonts ─────────────────────────────────────────────────
font_family        JetBrainsMono Nerd Font
bold_font          JetBrainsMono Nerd Font Bold
italic_font        JetBrainsMono Nerd Font Italic
bold_italic_font   JetBrainsMono Nerd Font Bold Italic

font_size          13.0

# Ligatures
font_features JetBrainsMonoNF-Regular +liga +calt
font_features JetBrainsMonoNF-Bold    +liga +calt

# Ajustement du rendu de police (macOS utilise CoreText)
text_composition_strategy legacy

# ── Curseur ───────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# ── Défilement ────────────────────────────────────────────
scrollback_lines       10000
scrollback_pager       less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ── Souris ────────────────────────────────────────────────
mouse_hide_wait        3.0
url_style              curly
open_url_with          default
url_prefixes           file ftp ftps git http https irc ircs kitty mailto
detect_urls            yes
copy_on_select         no
strip_trailing_spaces  smart
focus_follows_mouse    no

# ── Performance ───────────────────────────────────────────
repaint_delay          10
input_delay            3
sync_to_monitor        yes

# ── Fenêtre ───────────────────────────────────────────────
remember_window_size   yes
initial_window_width   220c
initial_window_height  50c

window_padding_width   8
window_border_width    1pt
draw_minimal_borders   yes
placement_strategy     center

# ── Onglets ───────────────────────────────────────────────
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_title_template     " {index}: {title} "
active_tab_font_style  bold

# ── macOS — Options spécifiques ───────────────────────────

# Option (Alt) gauche utilisée comme modificateur de touche dans le shell
macos_option_as_alt left

# Ferme l'app quand la dernière fenêtre est fermée
macos_quit_when_last_window_closed yes

# Fenêtre redimensionnable
macos_window_resizable yes

# Titlebar intégrée (none = barre native masquée, titlebar-only, etc.)
macos_titlebar_color background

# Espace colorimétrique pour un rendu fidèle sur écran Retina / P3
macos_colorspace displayp3

# Défilement classique (non inversé)
macos_traditional_fast_key_repeat yes

# Thunkpad trackpad : comportement naturel
# (laisser macOS gérer le scroll naturel)

# ── Raccourcis — macOS (Cmd) ──────────────────────────────
# Supprime tous les mappings par défaut pour un contrôle total
# clear_all_shortcuts yes   # décommenter pour repartir de zéro

# Copier / Coller
map cmd+c        copy_to_clipboard
map cmd+v        paste_from_clipboard

# Nouvelle fenêtre / fermeture
map cmd+n        new_os_window
map cmd+w        close_window

# Onglets
map cmd+t        new_tab_with_cwd
map cmd+shift+w  close_tab
map cmd+1        goto_tab 1
map cmd+2        goto_tab 2
map cmd+3        goto_tab 3
map cmd+4        goto_tab 4
map cmd+5        goto_tab 5
map cmd+shift+]  next_tab
map cmd+shift+[  previous_tab
map cmd+shift+,  move_tab_backward
map cmd+shift+.  move_tab_forward

# Taille de police
map cmd+equal    change_font_size all +1.0
map cmd+minus    change_font_size all -1.0
map cmd+0        change_font_size all 0

# Plein écran natif macOS
map cmd+ctrl+f   toggle_fullscreen

# Défilement
map cmd+up       scroll_to_prompt -1
map cmd+down     scroll_to_prompt 1
map cmd+k        scroll_line_up
map cmd+j        scroll_line_down
map cmd+page_up  scroll_page_up
map cmd+page_down scroll_page_down
map cmd+home     scroll_home
map cmd+end      scroll_end

# Pager de défilement (affiche l'historique complet)
map cmd+shift+h  show_scrollback

# Splits — fenêtres dans le même onglet
map cmd+d        launch --location=vsplit --cwd=current
map cmd+shift+d  launch --location=hsplit --cwd=current
map cmd+left     neighboring_window left
map cmd+right    neighboring_window right
map cmd+alt+left resize_window narrower 3
map cmd+alt+right resize_window wider 3
map cmd+alt+up   resize_window taller 3
map cmd+alt+down resize_window shorter 3

# Édition de config / rechargement
map cmd+,        edit_config_file
map cmd+shift+r  load_config_file

# ── Shell ─────────────────────────────────────────────────
# Utilise le shell par défaut de l'utilisateur (respecte /etc/shells)
shell .

# Indique à kitty le shell pour des fonctionnalités comme scroll_to_prompt
shell_integration enabled

# ── Notifications ─────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.0
window_alert_on_bell  yes
bell_on_tab           "🔔 "

# ── Divers ────────────────────────────────────────────────
update_check_interval  24
close_on_child_death   no
allow_remote_control   yes
listen_on              none
